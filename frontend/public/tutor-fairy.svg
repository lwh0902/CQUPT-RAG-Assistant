<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 360" fill="none">
  <defs>
    <linearGradient id="sky" x1="160" y1="0" x2="160" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8F8FF"/>
      <stop offset="1" stop-color="#CFF3FF"/>
    </linearGradient>
    <linearGradient id="wing" x1="40" y1="120" x2="140" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DFF6FF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#B8E9FF" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="dress" x1="160" y1="180" x2="160" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E7F7FF"/>
    </linearGradient>
    <linearGradient id="hair" x1="160" y1="40" x2="160" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E8EEF5"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(160 170) rotate(90) scale(120 130)">
      <stop stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#7DD3FC" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- soft ground glow -->
  <ellipse cx="160" cy="330" rx="70" ry="14" fill="#7DD3FC" opacity="0.18"/>

  <!-- aura -->
  <circle cx="160" cy="170" r="118" fill="url(#glow)"/>

  <!-- sparkles -->
  <g fill="#FFFFFF" opacity="0.9">
    <path d="M48 88l3 8 8 3-8 3-3 8-3-8-8-3 8-3 3-8z"/>
    <path d="M268 70l2.5 6.5 6.5 2.5-6.5 2.5-2.5 6.5-2.5-6.5-6.5-2.5 6.5-2.5 2.5-6.5z"/>
    <path d="M286 160l2 5 5 2-5 2-2 5-2-5-5-2 5-2 2-5z"/>
    <path d="M42 210l2 5 5 2-5 2-2 5-2-5-5-2 5-2 2-5z"/>
    <path d="M250 250l1.8 4.5 4.5 1.8-4.5 1.8-1.8 4.5-1.8-4.5-4.5-1.8 4.5-1.8 1.8-4.5z"/>
  </g>
  <g fill="#F9A8D4" opacity="0.75">
    <ellipse cx="70" cy="250" rx="5" ry="8" transform="rotate(-28 70 250)"/>
    <ellipse cx="250" cy="120" rx="4" ry="7" transform="rotate(22 250 120)"/>
    <ellipse cx="255" cy="220" rx="4.5" ry="7.5" transform="rotate(-18 255 220)"/>
  </g>

  <!-- wings -->
  <g filter="url(#soft)" opacity="0.95">
    <path d="M132 168c-42-18-78-8-96 28 28 8 56 4 78-12 8-18 14-28 18-16z" fill="url(#wing)" stroke="#A5E4FF" stroke-width="2"/>
    <path d="M128 190c-36 2-62 28-66 62 30-8 54-24 70-48 4-12 4-18-4-14z" fill="url(#wing)" stroke="#A5E4FF" stroke-width="2"/>
    <path d="M188 168c42-18 78-8 96 28-28 8-56 4-78-12-8-18-14-28-18-16z" fill="url(#wing)" stroke="#A5E4FF" stroke-width="2"/>
    <path d="M192 190c36 2 62 28 66 62-30-8-54-24-70-48-4-12-4-18 4-14z" fill="url(#wing)" stroke="#A5E4FF" stroke-width="2"/>
    <path d="M70 190c12-8 28-14 42-14" stroke="#E0F7FF" stroke-width="1.5" opacity="0.8"/>
    <path d="M250 190c-12-8-28-14-42-14" stroke="#E0F7FF" stroke-width="1.5" opacity="0.8"/>
  </g>

  <!-- body group -->
  <g filter="url(#soft)">
    <!-- legs / boots -->
    <path d="M138 286c-2 14 2 28 8 34 8 2 16-2 18-12-2-10-8-20-14-28-6 0-10 2-12 6z" fill="#F8FBFF" stroke="#D7EAF7" stroke-width="2"/>
    <path d="M182 286c2 14-2 28-8 34-8 2-16-2-18-12 2-10 8-20 14-28 6 0 10 2 12 6z" fill="#F8FBFF" stroke="#D7EAF7" stroke-width="2"/>
    <ellipse cx="148" cy="318" rx="16" ry="10" fill="#FFFFFF" stroke="#D7EAF7" stroke-width="2"/>
    <ellipse cx="172" cy="318" rx="16" ry="10" fill="#FFFFFF" stroke="#D7EAF7" stroke-width="2"/>
    <path d="M134 318h28" stroke="#BAE6FD" stroke-width="3" stroke-linecap="round"/>
    <path d="M158 318h28" stroke="#BAE6FD" stroke-width="3" stroke-linecap="round"/>

    <!-- dress -->
    <path d="M128 210c8-18 24-28 32-28s24 10 32 28c18 10 28 28 28 48 0 18-18 34-60 34s-60-16-60-34c0-20 10-38 28-48z" fill="url(#dress)" stroke="#D7EAF7" stroke-width="2.5"/>
    <path d="M118 248c12 8 28 14 42 14s30-6 42-14" stroke="#CFFAFE" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <path d="M124 268c14 8 24 10 36 10s22-2 36-10" stroke="#E0F2FE" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <!-- leaf badge -->
    <circle cx="160" cy="236" r="12" fill="#ECFDF5" stroke="#34D399" stroke-width="2"/>
    <path d="M160 228c6 4 8 10 0 16-8-6-6-12 0-16z" fill="#34D399"/>
    <path d="M160 230v12" stroke="#A7F3D0" stroke-width="1.5"/>

    <!-- arms -->
    <!-- left wave arm -->
    <path d="M118 198c-18-8-28-24-24-38 4-2 10 0 12 6 0 10 8 18 18 24 2 4 0 10-6 8z" fill="#FFE4D6" stroke="#F5C6B3" stroke-width="1.5"/>
    <circle cx="92" cy="156" r="9" fill="#FFE4D6" stroke="#F5C6B3" stroke-width="1.5"/>
    <path d="M86 148c-2-8 2-14 10-14" stroke="#F5C6B3" stroke-width="2" stroke-linecap="round"/>
    <!-- right arm relaxed -->
    <path d="M202 200c16-2 28 10 30 24-4 4-10 4-14 0-4-8-10-14-18-16-2-4 0-8 2-8z" fill="#FFE4D6" stroke="#F5C6B3" stroke-width="1.5"/>
    <circle cx="234" cy="228" r="8.5" fill="#FFE4D6" stroke="#F5C6B3" stroke-width="1.5"/>

    <!-- neck / collar flower -->
    <circle cx="160" cy="186" r="8" fill="#FFE4D6"/>
    <circle cx="160" cy="196" r="7" fill="#ECFDF5" stroke="#86EFAC" stroke-width="1.5"/>
    <circle cx="160" cy="196" r="2.5" fill="#FDE68A"/>

    <!-- head -->
    <circle cx="160" cy="132" r="48" fill="#FFE8DA" stroke="#F5C6B3" stroke-width="2"/>
    <!-- ears -->
    <path d="M112 136c-14 2-22-8-20-22 12 2 20 10 20 22z" fill="#FFE4D6" stroke="#F5C6B3" stroke-width="1.5"/>
    <path d="M208 136c14 2 22-8 20-22-12 2-20 10-20 22z" fill="#FFE4D6" stroke="#F5C6B3" stroke-width="1.5"/>
    <path d="M108 122c4 4 8 8 8 12" stroke="#F0B9A4" stroke-width="1.2" opacity="0.7"/>
    <path d="M212 122c-4 4-8 8-8 12" stroke="#F0B9A4" stroke-width="1.2" opacity="0.7"/>

    <!-- hair back -->
    <path d="M112 128c-4-40 28-72 48-72s52 32 48 72c-10-18-28-28-48-28s-38 10-48 28z" fill="url(#hair)"/>
    <!-- bangs -->
    <path d="M118 118c8-28 28-40 42-40 14 0 34 12 42 40-12-10-26-16-42-16s-30 6-42 16z" fill="#FFFFFF"/>
    <path d="M126 112c10-8 20-10 34-10 12 0 24 2 34 10-10-18-24-26-34-26s-24 8-34 26z" fill="#F8FAFC"/>
    <!-- side curls -->
    <path d="M112 140c-8 8-8 28 2 36 2-14 6-24 10-30-4-2-8-4-12-6z" fill="#F1F5F9"/>
    <path d="M208 140c8 8 8 28-2 36-2-14-6-24-10-30 4-2 8-4 12-6z" fill="#F1F5F9"/>
    <!-- ahoge -->
    <path d="M168 56c8-18 4-34-8-40 14 2 28 18 22 42-4 2-10 2-14-2z" fill="#38BDF8"/>
    <path d="M164 58c6-12 4-24-2-30 10 4 18 16 14 32-2 0-8 0-12-2z" fill="#7DD3FC"/>

    <!-- flower clips -->
    <g transform="translate(118 86)">
      <circle cx="0" cy="0" r="8" fill="#FEF9C3"/>
      <circle cx="-8" cy="-2" r="6" fill="#86EFAC"/>
      <circle cx="8" cy="-2" r="6" fill="#86EFAC"/>
      <circle cx="-4" cy="8" r="6" fill="#4ADE80"/>
      <circle cx="4" cy="8" r="6" fill="#4ADE80"/>
      <circle cx="0" cy="0" r="3" fill="#FDE047"/>
    </g>
    <g transform="translate(202 86)">
      <circle cx="0" cy="0" r="8" fill="#FEF9C3"/>
      <circle cx="-8" cy="-2" r="6" fill="#86EFAC"/>
      <circle cx="8" cy="-2" r="6" fill="#86EFAC"/>
      <circle cx="-4" cy="8" r="6" fill="#4ADE80"/>
      <circle cx="4" cy="8" r="6" fill="#4ADE80"/>
      <circle cx="0" cy="0" r="3" fill="#FDE047"/>
    </g>

    <!-- face -->
    <!-- eyes -->
    <ellipse cx="142" cy="134" rx="10" ry="12" fill="#FFFFFF" stroke="#1E3A5F" stroke-width="2"/>
    <ellipse cx="178" cy="134" rx="10" ry="12" fill="#FFFFFF" stroke="#1E3A5F" stroke-width="2"/>
    <ellipse cx="143" cy="135" rx="6" ry="8" fill="#2563EB"/>
    <ellipse cx="179" cy="135" rx="6" ry="8" fill="#2563EB"/>
    <ellipse cx="143" cy="136" rx="3.2" ry="4.2" fill="#0F172A"/>
    <ellipse cx="179" cy="136" rx="3.2" ry="4.2" fill="#0F172A"/>
    <circle cx="145.5" cy="132" r="2" fill="#FFFFFF"/>
    <circle cx="181.5" cy="132" r="2" fill="#FFFFFF"/>
    <!-- brows -->
    <path d="M132 118c6-4 14-4 20 0" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>
    <path d="M168 118c6-4 14-4 20 0" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>
    <!-- blush -->
    <ellipse cx="128" cy="150" rx="8" ry="4.5" fill="#FDA4AF" opacity="0.45"/>
    <ellipse cx="192" cy="150" rx="8" ry="4.5" fill="#FDA4AF" opacity="0.45"/>
    <!-- nose -->
    <path d="M160 144c1 2 1 3 0 4" stroke="#E8B4A4" stroke-width="1.5" stroke-linecap="round"/>
    <!-- smile -->
    <path d="M150 158c4 8 16 8 20 0" stroke="#E11D48" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M154 160c3 4 9 4 12 0" fill="#FCA5A5" opacity="0.35"/>
  </g>

  <!-- tiny flowers on ground -->
  <g opacity="0.9">
    <circle cx="86" cy="312" r="4" fill="#F9A8D4"/>
    <circle cx="80" cy="316" r="3.5" fill="#FBCFE8"/>
    <circle cx="92" cy="316" r="3.5" fill="#FBCFE8"/>
    <rect x="84" y="316" width="3" height="10" rx="1.5" fill="#86EFAC"/>
    <circle cx="236" cy="314" r="4" fill="#FEF08A"/>
    <circle cx="230" cy="318" r="3.2" fill="#FDE68A"/>
    <circle cx="242" cy="318" r="3.2" fill="#FDE68A"/>
    <rect x="234.5" y="318" width="3" height="9" rx="1.5" fill="#86EFAC"/>
  </g>
</svg>
